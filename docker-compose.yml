services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./app:/app/app          # live reload during dev
      - ./data:/app/data        # SQLite db persists outside container
    environment:
      - DATABASE_URL=sqlite:////app/data/vcamon.db
    restart: unless-stopped