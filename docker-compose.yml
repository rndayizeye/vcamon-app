services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - .:/project                        # ← mount whole project root
      - ./data:/project/data              # ← db persists here
    environment:
      - DATABASE_URL=sqlite:////project/data/vcamon.db
    restart: unless-stopped